name: Infrastructure Deployment
on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/infrastructure-deploy.yml"
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: starttech-cluster
  ECR_REPOSITORY: starttech-backend-api
  TF_WORKING_DIR: terraform

jobs:
  # ---------------------------------------------------------------
  # 1. Provision base infrastructure (VPC, EKS, S3, ECR, Redis)
  # ---------------------------------------------------------------
  terraform-infra:
    name: Terraform Apply (Infra)
    runs-on: ubuntu-latest
    outputs:
      ecr_repo_url: ${{ steps.tf_outputs.outputs.ecr_repo_url }}
      frontend_bucket: ${{ steps.tf_outputs.outputs.frontend_bucket }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan \
          -target=module.networking \
          -target=module.eks \
          -target=module.storage \
          -target=module.database

      - name: Terraform Apply 
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -target=module.networking \
            -target=module.eks \
            -target=module.storage \
            -target=module.database \

      - name: Capture outputs
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "ecr_repo_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Terraform Destroy (cleanup)
        if: ${{ always() }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve